# MiMo Voice conceptual configuration example
#
# This file is a design-oriented example for the current alpha stage.
# It documents the target configuration model that the project should move toward.
# Some field names may not yet map 1:1 to the current implementation.

provider:
  # Which TTS provider implementation to use.
  # Current practical direction: mimo / mini-vico style provider config.
  kind: mimo

  # How provider config is sourced.
  # supported design targets: direct | env | mini-vico
  source: direct

  # Direct provider settings.
  base_url: http://127.0.0.1:8000/v1
  api_key: your_api_key
  model: your_tts_model
  voice: default_zh

  # Optional provider-specific settings.
  extra:
    style: calm

  # Example for future mini-vico config reuse.
  # source: mini-vico
  # mini_vico:
  #   profile: default
  #   config_path: /path/to/mini-vico/config.yaml

audio:
  format: ogg_opus
  sample_rate: 24000
  save_intermediate: false

channel:
  kind: telegram

  telegram:
    bot_token: 123456:replace_me
    default_chat_id: 123456789

  # Future channel examples.
  # feishu:
  #   app_id: your_app_id
  #   app_secret: your_app_secret
  # wechat:
  #   endpoint: https://example.com/wechat

integration:
  openclaw:
    service_base_url: http://127.0.0.1:8091
    service_dir: /path/to/projects/mimo-voice/service
    prefer_cli: false
    default_channel: telegram

runtime:
  log_level: info
  temp_dir: ./tmp
